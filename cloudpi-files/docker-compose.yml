services:
  db:
    image: cloudpi1/cloudpi:Cloudpi_db_v1.1.048
    container_name: cloudpi-db
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    networks:
      - cloudpi-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost || exit 1",
        ]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 90s

    env_file:
      - .env
      - /run/secrets-tmp/cloudpi.secrets
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  app:
    image: cloudpi1/cloudpi:Cloudpi_v1.1.048
    container_name: cloudpi-app
    hostname: cloudpi-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/CPiP/v1/health && curl -f http://localhost/CPiN/monitor"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "443:443" # HTTPS
      - "80:80" # HTTP
    networks:
      - cloudpi-network
    env_file:
      - .env
      - /run/secrets-tmp/cloudpi.secrets
    environment:
      HOST: ${HOST:-localhost}
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      # Both services write their single JSON log here so host rsyslog can tail
      # /var/log/pico/*.log (spec 116). Flask reads this already; Node now honors
      # LOGS_BASE_DIR too (src/utils/logger.ts + frontendLogger.ts).
      LOGS_BASE_DIR: /var/log/pico
    volumes:
      - redis_data:/var/lib/redis
      - ./certs:/home/certs
      - cloudpi:/app/backups
      # Expose the JSON log dir to the host so the pre-installed rsyslog can tail it.
      # MUST be an absolute /var/log path: rsyslog's AppArmor profile only allows
      # reads under /var/log/** (NOT /root or /home), so a relative ./logs/pico
      # (which resolves under the bundle dir, e.g. /root/...) would be unreadable
      # by rsyslog. Pre-create on the host so the app (UID 1000) can WRITE and the
      # host `syslog` user can READ:
      #   mkdir -p /var/log/pico && chown -R 1000:syslog /var/log/pico && chmod 2750 /var/log/pico
      - /var/log/pico:/var/log/pico
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  cloudpi:
    driver: local

networks:
  cloudpi-network:
    driver: bridge
    # SECURITY: Enable network isolation
    internal: false  # Set to true if no external access needed
    ipam:
      config:
        - subnet: 172.28.0.0/16