# ============================================================================
# CloudPi syslog drop-in — wildcard file-tail pass-through (Feature 116)
# Install to: /etc/rsyslog.d/30-cloudpi.conf  (via ../setup-syslog.sh)
#
# Tails every *.log in /var/log/pico and MIRRORS each file VERBATIM into
# /var/log/cloudpi/<same-basename>. Routes by source filename only — no
# parsing, no category split, no re-encode. A dedicated ruleset keeps these
# records out of /var/log/syslog.
#
# Requires rsyslog >= 8.25 (wildcard imfile File=). For older daemons, comment
# out the wildcard input below and uncomment the per-file fallback block.
# Reversible: delete this file + `systemctl restart rsyslog` -> Phase-1 behavior.
# ============================================================================

# This deployment tails a BIND-MOUNTED dir, where inotify events are often not
# delivered — so polling (<=1s, meets the ~1s mirror SLA) is the SAFE DEFAULT.
# On a host where /var/log/pico is a normal local filesystem, switch to inotify
# (commented below) for lower latency / less CPU.
module(load="imfile" mode="polling" PollingInterval="1")
#   module(load="imfile" mode="inotify")

# Emit the message byte-for-byte. On rsyslog 8.2312, imfile's %msg% is the raw
# line with NO leading space, so use it as-is. Do NOT use %msg:2:$% here — that
# strips the first real character ('{') of the JSON. (Verified on-host 2026-06-29.)
template(name="cloudpiRaw" type="string" string="%msg%\n")

# Destination path is built from the SOURCE basename. NOTE: imfile's
# $!metadata!filename is the FULL source path, so we extract the basename first
# (see the `set` in the ruleset below) — do NOT put %$!metadata!filename% here.
template(name="cloudpiMirrorPath" type="string" string="/var/log/cloudpi/%$.cloudpibase%")

# Mirror ruleset — defined BEFORE the input that binds to it (safe ordering).
ruleset(name="cloudpi_mirror") {
    # Extract basename from the full source path (e.g. /var/log/pico/cloudpi-node.log -> cloudpi-node.log).
    # The regex end-anchor '$' MUST be escaped as \$ inside a RainerScript double-quoted string.
    set $.cloudpibase = re_extract($!metadata!filename, "([^/]+)\$", 0, 0, "unknown.log");
    action(type="omfile" dynaFile="cloudpiMirrorPath" template="cloudpiRaw")
    # Belt-and-suspenders: messages bound to this ruleset never traverse the
    # default ruleset, but stop makes the "not in /var/log/syslog" intent explicit.
    stop
}

# --- rsyslog >= 8.25: single wildcard input (preferred) ---------------------
# No static StateFile on a wildcard input — rsyslog auto-manages per-file state
# (exactly-once, resumes across restart). New *.log files are auto-discovered.
# Rotated *.log.N do NOT match *.log, so rotated history is never re-ingested.
input(type="imfile"
      File="/var/log/pico/*.log"
      Tag="cloudpi:"
      addMetadata="on"
      ruleset="cloudpi_mirror")

# --- rsyslog < 8.25 FALLBACK: one input() per known file --------------------
# Comment out the wildcard input() above, then uncomment these. Add a line per
# active *.log (single-file mode = these three; module-mode adds more).
#
# input(type="imfile" File="/var/log/pico/cloudpi-flask.log"    Tag="cloudpi:" addMetadata="on" ruleset="cloudpi_mirror")
# input(type="imfile" File="/var/log/pico/cloudpi-node.log"     Tag="cloudpi:" addMetadata="on" ruleset="cloudpi_mirror")
# input(type="imfile" File="/var/log/pico/cloudpi-frontend.log" Tag="cloudpi:" addMetadata="on" ruleset="cloudpi_mirror")
